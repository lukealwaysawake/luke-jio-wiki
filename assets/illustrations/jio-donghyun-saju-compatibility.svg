      <circle cx="82" cy="114" r="6" fill="#352820" />
      <circle cx="134" cy="114" r="6" fill="#352820" />
      <path class="thin" d="M88 143 C109 163 137 160 156 140" />
      <path d="M40 276 C60 190 157 185 188 276 C151 304 78 303 40 276Z" fill="#f18b68" class="soft" />
      <path class="thin" d="M55 212 C108 250 160 243 190 205" />
    </g>

    <path class="thin" d="M256 424 C302 468 420 466 472 420" stroke="#e4815d" />
    <path class="thin" d="M250 378 C332 332 412 336 482 380" stroke="#e4815d" opacity=".58" />

    <g transform="translate(320 492) rotate(-4)" class="soft">
      <path d="M0 0 L176 16 L160 118 L-12 104 Z" fill="#fff6dd" stroke="#4d3b31" stroke-width="4" />
      <path class="thin" d="M28 33 C68 48 106 46 144 35" />
      <path class="thin" d="M26 62 C66 77 104 75 142 64" opacity=".72" />
    </g>

    <g transform="translate(384 286)" class="soft">
      <path d="M0 116 C46 74 24 36 76 0 C64 54 124 58 106 124 C91 181 27 168 0 116Z" fill="#ff8d4f" />
      <path d="M46 122 C66 88 54 60 88 40 C82 82 126 92 102 136 C84 170 58 154 46 122Z" fill="#ffd565" />
      <path class="line" d="M-42 170 C24 144 92 144 154 170" stroke="#73543a" />
    </g>
  </g>

  <g class="soft">
    <path d="M184 572 C126 520 126 430 190 398 C226 380 266 386 294 412" class="thin" opacity=".7" />
    <path d="M1194 570 C1248 508 1230 420 1160 394 C1122 380 1084 390 1058 420" class="thin" opacity=".7" />
    <path d="M178 578 C202 600 238 602 264 584" class="thin" />
