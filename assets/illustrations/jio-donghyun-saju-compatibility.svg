    <path d="M-34 482 C64 392 228 354 400 384 C565 412 682 500 746 628 C556 720 236 724 22 630 C-44 600 -76 532 -34 482Z" fill="#fffaf0" opacity=".9" />
  </g>

  <g transform="translate(355 220)">
    <path class="thin" d="M-18 650 C184 730 514 718 744 646" stroke="#92775f" opacity=".58" />

    <g transform="translate(52 188) rotate(-2)">
      <circle cx="104" cy="104" r="76" fill="#ffd7b4" class="soft" />
      <path class="line" d="M44 101 C54 28 145 24 168 102 C128 78 86 80 44 101Z" />
      <circle cx="80" cy="112" r="6" fill="#352820" />
      <circle cx="130" cy="111" r="6" fill="#352820" />
