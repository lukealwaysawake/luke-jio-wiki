<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 980" role="img" aria-labelledby="title desc">
  <title id="title">따뜻한 관계의 작은 밤</title>
  <desc id="desc">두 사람이 밤하늘 아래 나란히 앉아 편지, 꽃, 작은 별빛을 사이에 두고 웃는 귀여운 손그림 일러스트</desc>
  <defs>
    <filter id="paper" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="4" seed="23" result="noise" />
      <feColorMatrix in="noise" type="saturate" values="0" result="grain" />
      <feBlend in="SourceGraphic" in2="grain" mode="multiply" opacity="0.22" />
    </filter>
    <filter id="rough" x="-6%" y="-6%" width="112%" height="112%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="9" result="turb" />
      <feDisplacementMap in="SourceGraphic" in2="turb" scale="2.6" xChannelSelector="R" yChannelSelector="G" />
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#5f412b" flood-opacity="0.15" />
    </filter>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fff3c8" />
      <stop offset="0.55" stop-color="#fff7df" />
      <stop offset="1" stop-color="#f6efd6" />
    </linearGradient>
    <style>
      .line { fill: none; stroke: #3d3028; stroke-width: 5.5; stroke-linecap: round; stroke-linejoin: round; filter: url(#rough); }
      .thin { fill: none; stroke: #56443a; stroke-width: 3.4; stroke-linecap: round; stroke-linejoin: round; filter: url(#rough); }
      .soft { filter: url(#rough); }
      .glow { opacity: .78; }
    </style>
  </defs>

  <rect width="1400" height="980" rx="48" fill="#fff8e8" />
  <g filter="url(#paper)">
    <rect x="28" y="24" width="1344" height="932" rx="42" fill="url(#sky)" />
    <path d="M76 792 C256 720 425 806 610 756 C820 698 1040 710 1328 802 L1328 936 L72 936 Z" fill="#efe6c9" opacity=".58" />
    <path d="M88 178 C270 76 474 132 654 92 C882 40 1108 84 1308 48" class="thin" opacity=".22" />
  </g>

  <g class="glow soft">
    <circle cx="240" cy="205" r="92" fill="#ffd96f" opacity=".46" />
    <circle cx="1132" cy="206" r="110" fill="#ffc0aa" opacity=".32" />
    <path d="M504 202 C580 120 726 128 804 208 C876 283 846 404 730 434 C607 466 480 398 460 294 C453 258 472 226 504 202Z" fill="#bde4c1" opacity=".46" />
    <path d="M420 692 C514 606 696 596 806 680 C914 762 864 900 716 922 C570 944 392 846 394 752 C395 724 404 707 420 692Z" fill="#f5b4c6" opacity=".38" />
  </g>

  <g class="soft" opacity=".9">
    <path d="M198 658 C228 614 276 614 304 660 C333 612 383 618 407 666 C437 727 308 806 303 810 C296 804 168 722 198 658Z" fill="#ff8da0" />
    <path d="M1036 650 C1062 615 1102 616 1126 654 C1150 616 1192 621 1214 662 C1240 713 1132 782 1126 786 C1120 781 1010 706 1036 650Z" fill="#ffb067" opacity=".86" />
  </g>

  <g class="soft" opacity=".78">
    <circle cx="418" cy="184" r="8" fill="#f7b84a" />
    <circle cx="930" cy="164" r="7" fill="#f7b84a" />
    <circle cx="1062" cy="338" r="8" fill="#8ccf93" />
    <circle cx="326" cy="366" r="7" fill="#8ccf93" />
    <path d="M644 145 l15 31 34 5 -25 24 6 34 -30 -16 -30 16 6 -34 -25 -24 34 -5Z" fill="#ffd967" opacity=".9" />
    <path d="M848 290 l10 20 22 3 -16 16 4 22 -20 -10 -20 10 4 -22 -16 -16 22 -3Z" fill="#ffd967" opacity=".82" />
    <path d="M178 390 l9 18 20 3 -14 14 3 20 -18 -9 -18 9 3 -20 -14 -14 20 -3Z" fill="#ffd967" opacity=".78" />
  </g>

